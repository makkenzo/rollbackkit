name: Documentation issue
description: Report missing, unclear or outdated documentation.
title: "docs: "
labels:
  - documentation
body:
  - type: textarea
    id: page
    attributes:
      label: Page or section
      description: Link or file path if known.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is confusing, missing or wrong?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
