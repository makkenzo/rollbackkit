name: Bug report
description: Report broken RollbackKit behavior.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "@rollbackkit/core"
        - "@rollbackkit/postgres"
        - "@rollbackkit/cli"
        - apps/demo-next
        - apps/docs
        - repository tooling
        - unknown
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps, code sample or repository link.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "0.0.0 / commit SHA"
